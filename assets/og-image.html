<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>slide library — OG image</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root {
    --paper: #f5f1e6;
    --ink: #0d0d0c;
    --ink-2: #2a2926;
    --muted: #6b6962;
    --line: rgba(13, 13, 12, 0.14);
    --accent: #ff5a1f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    font-family: "Pretendard Variable", Pretendard, Inter, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 18% -10%, rgba(255, 90, 31, 0.08), transparent 55%),
      var(--paper);
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(13, 13, 12, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(13, 13, 12, 0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  .left {
    position: absolute;
    left: 72px;
    top: 80px;
    right: 580px;
    bottom: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }
  .topline {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: Inter, sans-serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-2);
    font-weight: 600;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
  }
  h1 {
    font-family: "Instrument Serif", serif;
    font-size: 140px;
    line-height: 0.9;
    margin: 18px 0 28px;
    font-weight: 400;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  h1 em {
    color: var(--accent);
    font-style: italic;
  }
  .tag {
    font-size: 22px;
    line-height: 1.5;
    color: var(--ink-2);
    max-width: 520px;
    margin: 0;
    font-weight: 500;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: Inter, sans-serif;
    font-size: 14px;
    color: var(--muted);
  }
  .meta strong {
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .logo {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: url("./logo.png") center / cover no-repeat;
    box-shadow: 0 4px 14px -4px rgba(255, 90, 31, 0.5);
  }

  .right {
    position: absolute;
    right: -30px;
    top: 60px;
    bottom: 60px;
    width: 560px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .stack {
    position: relative;
    width: 480px;
    height: 500px;
  }
  .card {
    position: absolute;
    width: 400px;
    height: 250px;
    background: white;
    border-radius: 6px;
    box-shadow: 0 30px 60px -25px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(0, 0, 0, 0.05);
    overflow: hidden;
  }
  .card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card.c1 { transform: rotate(-8deg) translate(-30px, 0); top: 20px; left: 0; }
  .card.c2 { transform: rotate(2deg); top: 130px; left: 60px; z-index: 2; }
  .card.c3 { transform: rotate(8deg) translate(20px, 0); top: 240px; left: 30px; z-index: 1; }
</style>
</head>
<body>
  <div class="left">
    <div>
      <div class="topline"><span class="dot"></span><span>HTML SLIDE TEMPLATES</span></div>
      <h1>slide<br><em>library</em></h1>
      <p class="tag">AI에게 한 문장만 던지면<br>주제에 맞는 템플릿을 골라 슬라이드를 만들어 줍니다.</p>
    </div>
    <div class="footer">
      <span class="meta"><strong>35 templates</strong> · 6 categories</span>
      <span class="logo" aria-label="AI Roasting"></span>
    </div>
  </div>
  <div class="right">
    <div class="stack">
      <div class="card c1"><img src="../screenshots/dark-magazine-1.png" alt=""></div>
      <div class="card c2"><img src="../screenshots/mckinsey-navy-1.png" alt=""></div>
      <div class="card c3"><img src="../screenshots/sunshine-yellow-1.png" alt=""></div>
    </div>
  </div>
</body>
</html>
